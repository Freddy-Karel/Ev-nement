# ============================================================
# APPLICATION
# ============================================================
spring.application.name=invitation-platform
server.port=8080

# ============================================================
# BASE DE DONNÉES MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/invitation_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de connexions
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ============================================================
# JWT
# ============================================================
# Clé secrète (minimum 32 caractères pour HMAC-SHA256)
jwt.secret=${JWT_SECRET:mySecretKeyForJWTGeneration2026WithAtLeast32Chars!}
# Expiration en millisecondes : 86400000 = 24 heures
jwt.expiration=86400000

# ============================================================
# ADMIN PAR DÉFAUT (créé au démarrage si table vide)
# ============================================================
admin.default.email=admin@icc.ga
admin.default.password=admin123

# ============================================================
# BASE URL (utilisée pour les liens de confirmation)
# ============================================================
# ============================================================
# BASE URL (configuration réseaux pour les emails)
# ============================================================
app.base-url=${APP_BASE_URL:http://192.168.1.70:3000}
app.frontend.url=${APP_FRONTEND_URL:http://192.168.1.70:3000}
app.confirmation-url=https://iccc.ga/confirm

# ============================================================
# LOGGING
# ============================================================
logging.level.com.invitation=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================================
# JACKSON (sérialisation/désérialisation dates)
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ============================================================
# MULTIPART (upload logo + bannière pour génération PDF)
# ============================================================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# ============================================================
# EMAIL (Gmail SMTP)
